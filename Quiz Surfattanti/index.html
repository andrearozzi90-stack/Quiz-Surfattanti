<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Quiz Surfattanti</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0fdf4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .quiz {
      background: white;
      padding: 20px;
      max-width: 500px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    button {
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      cursor: pointer;
    }
    .correct { background: #22c55e; color: white; }
    .wrong { background: #ef4444; color: white; }
  </style>
</head>
<body>

<div class="quiz" id="quiz"></div>

<script>
const questions = [
  { q: "Cosa sono i surfattanti?", a: ["Aumentano il peso dell’acqua", "Mescolano acqua e grasso", "Tipi di plastica"], c: 1 },
  { q: "Dove li troviamo più spesso?", a: ["Nei detersivi", "Nei carburanti", "Nell’aria"], c: 0 },
  { q: "Quale prodotto li contiene quasi sempre?", a: ["Carta", "Detersivo piatti", "Acqua"], c: 1 },
  { q: "Perché possono inquinare?", a: ["Evaporano", "Sono tossici per organismi", "Rendono l’acqua salata"], c: 1 },
  { q: "Cosa succede in eccesso?", a: ["Più ossigeno", "Più schiuma e meno ossigeno", "Pesci crescono"], c: 1 }
];

let i = 0, score = 0;

function render() {
  const q = questions[i];
  let html = `<h3>${q.q}</h3>`;
  q.a.forEach((ans, idx) => {
    html += `<button onclick="answer(${idx})">${ans}</button>`;
  });
  document.getElementById("quiz").innerHTML = html;
}

function answer(idx) {
  const buttons = document.querySelectorAll("button");
  buttons[q.c].classList.add("correct");
  if (idx !== questions[i].c) buttons[idx].classList.add("wrong");
  if (idx === questions[i].c) score++;
  setTimeout(() => {
    i++;
    if (i < questions.length) render();
    else document.getElementById("quiz").innerHTML =
      `<h2>Quiz completato!</h2><p>Risposte corrette: ${score}/${questions.length}</p>
       <button onclick="location.reload()">Ricomincia</button>`;
  }, 1000);
}

render();
</script>
  Move index.html to root

</body>
</html>
